<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Quản lý Gia phả</title>
    <link rel="stylesheet" href="/style.css">
    <style>
        body { 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            background-color: #f4f7f6; 
            margin: 0;
            font-family: Arial, sans-serif;
        }
        .login-box { 
            background: white; 
            padding: 30px; 
            border-radius: 8px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); 
            width: 350px; 
        }
        .login-box h2 { 
            text-align: center; 
            margin-bottom: 20px; 
            color: #2c3e50; 
        }
        .form-group { 
            margin-bottom: 15px; 
        }
        .form-group input { 
            width: 100%; 
            padding: 10px; 
            border: 1px solid #ddd; 
            border-radius: 4px; 
            box-sizing: border-box; /* Đảm bảo padding không làm tràn input */
        }
        .btn-login { 
            width: 100%; 
            padding: 10px; 
            background: #27ae60; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer; 
            font-size: 16px; 
        }
        .btn-login:hover { 
            background: #219150; 
        }
        .error { 
            color: #e74c3c; 
            text-align: center; 
            margin-top: 15px; 
            display: none; 
            font-size: 0.9em;
        }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>Đăng Nhập</h2>
        
        <div class="form-group">
            <input type="text" id="username" placeholder="Tên đăng nhập">
        </div>
        
        <div class="form-group">
            <input type="password" id="password" placeholder="Mật khẩu">
        </div>
        
        <button class="btn-login" onclick="handleLogin()">Đăng nhập</button>
        
        <p id="error-msg" class="error"></p>
    </div>

    <script>
        async function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            // Reset thông báo lỗi
            errorMsg.style.display = 'none';

            if (!username || !password) {
                errorMsg.innerText = 'Vui lòng nhập đầy đủ thông tin';
                errorMsg.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    // Bổ sung: Lưu thông tin người dùng để phân quyền ở trang chính
                    if (data.user) {
                        localStorage.setItem('userRole', data.user.role);
                        localStorage.setItem('userName', data.user.full_name);
                    }
                    window.location.href = '/';
                } else {
                    errorMsg.innerText = data.message || data.error || 'Đăng nhập thất bại';
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.innerText = 'Lỗi kết nối server';
                errorMsg.style.display = 'block';
            }
        }

        // Cho phép nhấn Enter để đăng nhập
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                handleLogin();
            }
        });
    </script>
    
</body>
</html>
