<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Quản lý Gia phả</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body { justify-content: center; align-items: center; }
        .login-box { background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 350px; }
        .login-box h2 { text-align: center; margin-bottom: 20px; color: #2c3e50; }
        .form-group { margin-bottom: 15px; }
        .form-group input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; }
        .btn-login { width: 100%; padding: 10px; background: #27ae60; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; }
        .btn-login:hover { background: #219150; }
        .error { color: red; text-align: center; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="login-box">
        <h2>Đăng Nhập</h2>
        <div class="form-group">
            <input type="text" id="username" placeholder="Tên đăng nhập">
        </div>
        <div class="form-group">
            <input type="password" id="password" placeholder="Mật khẩu">
        </div>
        <button class="btn-login" onclick="handleLogin()">Đăng nhập</button>
        <p id="error-msg" class="error"></p>
        <p style="text-align: center; margin-top: 10px; font-size: 0.9em;">Chưa có tài khoản? <a href="#" onclick="handleRegister()">Đăng ký ngay</a></p>
    </div>

    <script>
        async function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const data = await res.json();

                if (res.ok) {
                    localStorage.setItem('token', data.token);
                    window.location.href = '/';
                } else {
                    errorMsg.innerText = data.message;
                    errorMsg.style.display = 'block';
                }
            } catch (err) {
                errorMsg.innerText = 'Lỗi kết nối server';
                errorMsg.style.display = 'block';
            }
        }

        async function handleRegister() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if(!username || !password) return alert("Vui lòng nhập tài khoản và mật khẩu để đăng ký");

            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });
            const data = await res.json();
            alert(data.message);
        }
    </script>
</body>
</html>
