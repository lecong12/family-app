<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ thống Quản lý Gia phả</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <div id="toolbar">
        <button onclick="openModal()">+ Thêm Thành Viên</button>
        <input type="file" id="file-up" hidden onchange="uploadFile(this)">
        <button onclick="document.getElementById('file-up').click()">Import CSV/GEDCOM</button>
        
        <div class="filters-group">
            <select id="filter-branch" onchange="applyFilters()">
                <option value="all">Tất cả Phái</option>
            </select>
            <label for="filter-gen">Đời: </label>
            <input type="range" id="filter-gen" min="1" max="20" value="20" oninput="applyFilters()">
        </div>
    </div>

    <div id="main-container">
        <div id="tree-canvas"></div>

        <div id="memberList">
            <div class="list-header">
                <h3>Danh sách Thành viên</h3>
                <p>Tổng số: <span id="member-count">0</span></p>
            </div>
            <div id="members-container"></div>
        </div>
    </div>

    <div id="member-modal" class="modal">
        <div class="modal-content">
            <h3>Thêm Thành Viên Mới</h3>
            <div class="form-group">
                <input type="text" id="m-name" placeholder="Họ tên">
                <select id="m-gender">
                    <option value="Nam">Nam</option>
                    <option value="Nữ">Nữ</option>
                </select>
                <input type="number" id="m-gen" placeholder="Đời thứ (ví dụ: 5)">
                <input type="text" id="m-branch" placeholder="Phái (ví dụ: Phái 1)">
                <select id="m-fid" onchange="updateMothers(this.value)">
                    <option value="">Chọn Cha</option>
                </select>
                <select id="m-mid">
                    <option value="">Chọn Mẹ</option>
                </select>
            </div>
            <div class="modal-actions">
                <button onclick="saveMember()" class="btn-save">Lưu</button>
                <button onclick="closeModal()" class="btn-close">Đóng</button>
            </div>
        </div>
    </div>

    <script src="/js/renderer.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
