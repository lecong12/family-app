<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gia Phả Họ Lê Công - Hệ Thống Quản Lý</title>
    
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../tree.css">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="dashboard-page">

    <header class="header">
        <div class="header-container">
            <div class="header-left">
                <div class="logo">
                    <i class="fas fa-sitemap"></i>
                </div>
                <div class="header-info">
                    <h1>Gia Phả Họ Lê Công</h1>
                    <p class="user-role" id="userRole"><i class="fas fa-spinner fa-spin"></i> Đang xác thực...</p>
                </div>
            </div>
            <div class="header-right">
                <div class="user-profile">
                    <span class="user-name" id="userName">Admin</span>
                    <button class="btn-logout" onclick="logout()" title="Đăng xuất">
                        <i class="fas fa-sign-out-alt"></i> <span>Đăng Xuất</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <nav class="tabs-container" id="mainTabs">
        <button class="tab-btn active" data-tab="posts" data-target="#posts-tab">
            <i class="fas fa-newspaper"></i> <span>Bài Viết</span>
        </button>
        <button class="tab-btn" data-tab="dashboard" data-target="#dashboard-tab">
            <i class="fas fa-chart-line"></i> <span>Dashboard</span>
        </button>
        <button class="tab-btn" data-tab="tree" data-target="#tree-tab">
            <i class="fas fa-tree"></i> <span>Cây Gia Phả</span>
        </button>
        <button class="tab-btn" data-tab="members" data-target="#members-tab">
            <i class="fas fa-users"></i> <span>Thành viên</span>
        </button>
        <button class="tab-btn" data-tab="settings" data-target="#settings-tab">
            <i class="fas fa-cog"></i> <span>Cài Đặt</span>
        </button>
    </nav>

    <main class="main-content">
        
        <section id="posts-tab" class="tab-content active">
            <div class="tree-section">
                <div class="section-header">
                    <div class="header-title">
                        <i class="fas fa-bullhorn"></i>
                        <h2>Bài Viết & Thông Báo</h2>
                    </div>
                    <button class="btn-primary" onclick="openCreatePostModal()">
                        <i class="fas fa-plus"></i> Viết bài mới
                    </button>
                </div>
                <div id="posts-list-container" class="posts-grid">
                    <div class="loading-state">Đang tải danh sách bài viết...</div>
                </div>
            </div>
        </section>

        <section id="dashboard-tab" class="tab-content">
            <div id="stats-content-wrapper" class="dashboard-wrapper">
                <div class="loading-overlay">
                    <i class="fas fa-chart-pie fa-3x"></i>
                    <p>Đang phân tích dữ liệu gia phả...</p>
                </div>
            </div>
        </section>

        <section id="tree-tab" class="tab-content">
            <div class="tree-section">
                <div class="tree-controls">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" id="tree-search-input" class="search-input" placeholder="Tìm người trong dòng họ...">
                        <div id="tree-search-results" class="search-results-dropdown"></div>
                    </div>
                    <div class="action-buttons">
                        <button class="btn-secondary" onclick="zoomToNode(null)">
                            <i class="fas fa-expand-arrows-alt"></i> Toàn cảnh
                        </button>
                        <button class="btn-secondary" id="export-tree-pdf">
                            <i class="fas fa-file-pdf"></i> Xuất PDF
                        </button>
                    </div>
                </div>
                <div id="tree-canvas-container">
                    <div id="tree-canvas"></div>
                </div>
            </div>
        </section>

        <section id="members-tab" class="tab-content">
            <div class="tree-section">
                <div class="section-header">
                    <div class="search-bar">
                        <i class="fas fa-search"></i>
                        <input type="text" id="member-search-input" placeholder="Tên, địa chỉ hoặc đời thứ...">
                    </div>
                    <button class="btn-primary" onclick="openAddModal()">
                        <i class="fas fa-user-plus"></i> Thêm Thành viên
                    </button>
                </div>
                <div class="members-grid" id="membersGrid">
                    </div>
            </div>
        </section>

        <section id="settings-tab" class="tab-content">
            <div class="tree-section">
                <div class="section-header">
                    <h2><i class="fas fa-tools"></i> Cài đặt hệ thống</h2>
                </div>
                <div id="settings-content-wrapper" class="settings-grid">
                    </div>
            </div>
        </section>
    </main>

    <div id="modal-container"></div>

    <script src="js/renderer.js"></script>
    <script src="js/main.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            // Logic chuyển Tab đồng bộ với UI
            const tabs = document.querySelectorAll('.tab-btn');
            const contents = document.querySelectorAll('.tab-content');

            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const target = tab.getAttribute('data-target');

                    // Remove active classes
                    tabs.forEach(t => t.classList.remove('active'));
                    contents.forEach(c => c.classList.remove('active'));

                    // Add active classes
                    tab.classList.add('active');
                    document.querySelector(target).classList.add('active');
                    
                    // Trigger lại logic cho Tree nếu chuyển sang tab Tree
                    if(tab.dataset.tab === 'tree' && typeof renderTree === 'function') {
                        renderTree(); 
                    }
                });
            });

            // Tự động kích hoạt tab đầu tiên
            if (tabs.length > 0) tabs[0].click();
        });
    </script>
</body>
</html>
