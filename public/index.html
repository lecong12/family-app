<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gia Phả Họ Lê Công - Quản lý</title>
    
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="../tree.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="dashboard-page">
    <header class="header">
        <div class="header-container">
            <div class="header-left">
                <div class="logo"><i class="fas fa-sitemap"></i></div>
                <div class="header-info">
                    <h1>Gia Phả Họ Lê Công</h1>
                    <p class="user-role" id="userRole">Đang tải...</p>
                </div>
            </div>
            <div class="header-right">
                <span class="user-name" id="userName"></span>
                <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Đăng Xuất</button>
            </div>
        </div>
    </header>

    <div class="tabs-container" id="mainTabs">
        <button class="tab-btn" data-tab="posts" data-target="#posts-tab"><i class="fas fa-newspaper"></i> Bài Viết</button>
        <button class="tab-btn" data-tab="dashboard" data-target="#dashboard-tab"><i class="fas fa-chart-line"></i> Dashboard</button>
        <button class="tab-btn" data-tab="tree" data-target="#tree-tab"><i class="fas fa-sitemap"></i> Cây Gia Phả</button>
        <button class="tab-btn" data-tab="members" data-target="#members-tab"><i class="fas fa-users"></i> Thành viên</button>
        <button class="tab-btn" data-tab="settings" data-target="#settings-tab"><i class="fas fa-cog"></i> Cài Đặt</button>
    </div>

    <div class="main-content">
        <div id="posts-tab" class="tab-content">
            <div class="tree-section">
                <div class="members-header">
                    <h2 style="font-size: 20px; margin: 0;">📢 Bài Viết & Thông Báo</h2>
                    <button class="btn-add" onclick="openCreatePostModal()">+ Viết bài mới</button>
                </div>
                <div id="posts-list-container" class="posts-grid">Đang tải danh sách bài viết...</div>
            </div>
        </div>

        <div id="dashboard-tab" class="tab-content" style="display:none;">
            <div id="stats-content-wrapper"></div>
        </div>

        <div id="tree-tab" class="tab-content" style="display:none;">
            <div class="tree-section">
                <div id="tree-canvas" style="height: calc(100vh - 250px); border: 1px solid #ddd; background: #f9f9f9;"></div>
            </div>
        </div>

        <div id="members-tab" class="tab-content" style="display:none;">
            <div class="tree-section">
                <div class="members-header">
                    <input type="text" id="member-search-input" placeholder="Tìm kiếm thành viên...">
                    <button class="btn-add" onclick="openAddModal()">+ Thêm Thành viên</button>
                </div>
                <div class="members-grid" id="membersGrid"></div>
            </div>
        </div>

        <div id="settings-tab" class="tab-content" style="display:none;">
            <div id="settings-content-wrapper" class="settings-grid"></div>
        </div>
    </div>

    <div id="post-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2 id="post-modal-title">Thông tin bài viết</h2>
            <input type="hidden" id="edit-post-id">
            <div class="form-group">
                <label>Tiêu đề</label>
                <input type="text" id="post-title-input" placeholder="Nhập tiêu đề...">
                <input type="hidden" id="postTitle"> 
            </div>
            <div class="form-group">
                <label>Nội dung</label>
                <textarea id="post-content-input" rows="6" placeholder="Nhập nội dung..."></textarea>
                <textarea id="postContent" style="display:none;"></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn-cancel" onclick="closePostModal()">Hủy</button>
                <button class="btn-save" onclick="savePost()">Lưu lại</button>
            </div>
        </div>
    </div>

    <div id="member-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h2 id="modalTitle">Thành viên</h2>
            <form id="memberForm" onsubmit="event.preventDefault(); saveMember();">
                <input type="hidden" id="memberId">
                <div class="form-grid">
                    <input type="text" id="name" placeholder="Họ và tên" required>
                    <select id="gender"><option value="Nam">Nam</option><option value="Nữ">Nữ</option></select>
                </div>
                <button type="submit" class="btn-save">Xác nhận</button>
                <button type="button" onclick="closeModal()">Đóng</button>
            </form>
        </div>
    </div>

    <script src="js/renderer.js"></script>
    <script src="js/main.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const tabs = document.querySelectorAll('.tab-btn');
            const contents = document.querySelectorAll('.tab-content');

            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    const target = tab.getAttribute('data-target');
                    contents.forEach(c => c.style.display = 'none');
                    tabs.forEach(t => t.classList.remove('active'));
                    
                    document.querySelector(target).style.display = 'block';
                    tab.classList.add('active');
                });
            });
            if (tabs[0]) tabs[0].click();
        });

        // Hàm đóng modal dự phòng
        function closePostModal() { document.getElementById('post-modal').style.display = 'none'; }
        function closeModal() { document.getElementById('member-modal').style.display = 'none'; }
    </script>
</body>
</html>
