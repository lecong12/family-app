<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Gia Phả</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <div id="toolbar">
        <button onclick="openModal()">+ Thêm Thành Viên</button>
        <input type="file" id="file-up" hidden onchange="uploadFile(this)">
        <button onclick="document.getElementById('file-up').click()">Import CSV/GEDCOM</button>
        <select id="filter-branch" onchange="applyFilters()"><option value="all">Tất cả Phái</option></select>
        <label for="filter-gen">Đời: </label><input type="range" id="filter-gen" min="1" max="20" value="20" oninput="applyFilters()">
    </div>

    <div id="tree-canvas"></div>

    <div id="member-modal" class="modal">
        <div class="modal-content">
            <h3>Thêm Thành Viên</h3>
            <input type="text" id="m-name" placeholder="Họ tên">
            <select id="m-gender"><option value="Nam">Nam</option><option value="Nữ">Nữ</option></select>
            <select id="m-fid" onchange="updateMothers(this.value)"><option value="">Chọn Cha</option></select>
            <select id="m-mid"><option value="">Chọn Mẹ</option></select>
            <button onclick="saveMember()">Lưu</button>
            <button onclick="closeModal()">Đóng</button>
        </div>
    </div>

    <script src="js/renderer.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
