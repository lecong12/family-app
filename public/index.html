<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Gia Phả</title>
    <link rel="stylesheet" href="/style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <!-- Tiêu đề trang -->
    <div id="header" style="background-color: #34495e; color: white; padding: 15px; text-align: center; border-bottom: 1px solid #2c3e50;">
        <h1 style="margin: 0; font-size: 24px; text-transform: uppercase;">Gia Phả Dòng Họ Lê Công</h1>
    </div>
    <!-- Thanh công cụ -->
    <div id="toolbar">
        <button onclick="openAddModal()">+ Thêm thành viên</button>
        <button id="btn-sync-sheets" onclick="syncGoogleSheets()" style="background-color: #f39c12;">🔄 Nạp từ Google Sheets</button>
        
        <div class="search-container">
            <input type="text" id="search-input" onkeyup="handleSearch()" placeholder="Tìm kiếm thành viên...">
            <div id="search-results"></div>
        </div>

        <span style="margin-left: auto;">Số lượng: <b id="member-count">0</b></span>
        <button onclick="logout()" style="background-color: #e74c3c; margin-left: 10px;">Đăng xuất</button>
    </div>

    <!-- Khu vực chính -->
    <div id="main-container">
        <div id="tree-canvas"></div> <!-- Nơi vẽ cây -->
        <div id="memberList">
            <h3>Danh sách thành viên</h3>
            <div id="members-container"></div>
        </div>
    </div>

    <!-- Modal Thêm mới / Import -->
    <div id="add-member-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal()">&times;</span>
            <h2 id="modal-title">Thêm thành viên</h2>
            
            <div class="form-group">
                <label>Họ và tên:</label>
                <input type="text" id="m-name" placeholder="Nhập họ tên...">
            </div>

            <div class="form-group">
                <label>Thông tin:</label>
                <select id="m-gender"><option value="Nam">Nam</option><option value="Nữ">Nữ</option></select>
                <select id="m-fid"><option value="">Chọn Cha</option></select>
                <select id="m-mid"><option value="">Chọn Mẹ</option></select>
                <select id="m-pid"><option value="">Chọn Vợ/Chồng</option></select>
            </div>
            <div class="modal-actions">
                <button class="btn-save btn-primary" onclick="saveMember()">Lưu thông tin</button>
                <button id="btn-delete-member" class="btn-danger" onclick="deleteMember()" style="display: none;">Xóa thành viên</button>
            </div>
        </div>
    </div>

    <script src="/js/renderer.js"></script>
    <script src="/js/main.js"></script>
</body>
</html>
